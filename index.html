<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Korean Map</title>
</head>
<body>
    <button class="tablink" onclick="openPage('home', 'this', 'red')">Home</button>
    <button class="tablink" onclick="openPage('mappage', 'this', 'beige')">Map</button>

    <div id="home" class="tabcontent">
        <h1 style="color:#4E2A2A;" id="typewriter">Welcome!</h1>
    </div>

    <div id="mappage" class="tabcontent">
        <p id="heading">Map</p>
        <div class="topnav">
            <input id="search" type="text" placeholder="Search..">
            <button id="button">Go</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="logic.js"></script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIPm5yPuwOOT9lKV4qeA58IZcNbIq4NOI&callback=initMap"></script>
</body>
</html>
